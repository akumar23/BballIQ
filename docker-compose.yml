services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: nba-stats-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: nba_stats
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: nba-stats-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nba-stats-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/nba_stats
      REDIS_URL: redis://redis:6379/0
      NBA_API_CACHE_DIR: /app/data/nba_api_cache
    volumes:
      - ./backend:/app
      - nba_api_cache:/app/data/nba_api_cache
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # Celery Worker
  celery-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nba-stats-celery-worker
    entrypoint: []
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/nba_stats
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      NBA_API_CACHE_DIR: /app/data/nba_api_cache
    volumes:
      - ./backend:/app
      - nba_api_cache:/app/data/nba_api_cache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: celery -A app.core.celery_app worker --loglevel=info --queues=data_refresh --concurrency=1

  # Celery Beat Scheduler
  celery-beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nba-stats-celery-beat
    entrypoint: []
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/nba_stats
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ./backend:/app
    depends_on:
      - redis
      - celery-worker
    command: celery -A app.core.celery_app beat --loglevel=info

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nba-stats-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

  # One-shot service: runs migrations + seeds current season data (8 phases)
  # Usage: docker compose --profile seed run --rm seed
  seed:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nba-stats-seed
    entrypoint: []
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/nba_stats
      REDIS_URL: redis://redis:6379/0
      NBA_API_CACHE_DIR: /app/data/nba_api_cache
    volumes:
      - ./backend:/app
      - nba_api_cache:/app/data/nba_api_cache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m scripts.seed_all
    profiles:
      - seed

  # One-shot service: seeds ALL data for EVERY season (2013-14 through 2024-25)
  # Usage: docker compose --profile seed-all run --rm seed-all
  # WARNING: This takes several hours due to NBA API rate limits
  seed-all:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nba-stats-seed-all
    entrypoint: []
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/nba_stats
      REDIS_URL: redis://redis:6379/0
      NBA_API_CACHE_DIR: /app/data/nba_api_cache
    volumes:
      - ./backend:/app
      - nba_api_cache:/app/data/nba_api_cache
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: python -m scripts.seed_everything
    profiles:
      - seed-all

volumes:
  postgres_data:
  nba_api_cache:
