[project]
name = "statfloor"
version = "0.1.0"
description = "Per-touch offensive and defensive metrics for every NBA player"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.109.0",
    "uvicorn[standard]>=0.27.0",
    "sqlalchemy>=2.0.0",
    "psycopg2-binary>=2.9.9",
    "alembic>=1.13.0",
    "nba_api>=1.5.0,<2.0.0",
    "pbpstats>=1.0.0,<2.0.0",
    "redis>=5.0.0",
    "celery>=5.3.0",
    "pydantic>=2.5.0",
    "pydantic-settings>=2.1.0",
    "httpx>=0.26.0",
    "pandas>=2.1.0",
    "numpy>=1.26.0",
    "beautifulsoup4>=4.12.0",
    "lxml>=5.0.0",
    "fastapi-cache2[redis]>=0.2.1,<0.3",
    # Observability: Sentry for error reporting (optional at runtime — skipped
    # when SENTRY_DSN is unset), Prometheus metrics endpoint, structlog for
    # JSON-formatted logs with per-request / per-task context.
    "sentry-sdk[fastapi,celery,sqlalchemy,redis]>=2.0,<3.0",
    "prometheus-fastapi-instrumentator>=7.0,<8.0",
    "structlog>=24.1,<26.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.23.0",
    "pytest-cov>=4.1.0",
    "pytest-mock>=3.12.0",
    "fakeredis>=2.21.0",
    "ruff>=0.1.0",
    "mypy>=1.8.0",
    "types-requests>=2.31.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["app"]

[tool.ruff]
target-version = "py311"
line-length = 120
# Auto-generated migrations and legacy one-off fetch scripts are outside the
# enforced quality bar; gate only application + test code.
extend-exclude = ["alembic/versions", "scripts"]

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.ruff.lint.per-file-ignores]
# SQLAlchemy filters require `== True` / `== False` — truthiness triggers the ORM magic.
"app/api/routes/*.py" = ["E712"]
# Data-shape mappers and fetcher code have wide literal rows that don't benefit from wrapping.
"app/services/nba_data.py" = ["E501"]
"app/services/player_card.py" = ["E501"]
"app/services/impact_calculator.py" = ["E501"]
"app/services/bpm_calculator.py" = ["E501"]

[tool.mypy]
python_version = "3.11"
ignore_missing_imports = true
check_untyped_defs = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unreachable = true
# Legacy service code is incrementally typed; strict gate applies to new code only.
disallow_untyped_defs = false
disallow_untyped_decorators = false
disallow_any_generics = false

# Pydantic-response-model callsites pass plain dicts where typed models are declared;
# runtime is fine (pydantic validates) but the static shapes are out of sync. Tracked
# as tech debt - revisit when the response schemas are flattened.
[[tool.mypy.overrides]]
module = [
    "app.api.routes.leaderboards",
    "app.api.routes.play_types",
    "app.api.routes.players",
]
disable_error_code = ["arg-type"]

# Legacy metric/calculator modules: heavily-untyped numeric code (Decimal/float/int
# mixing, dynamic object attribute access). Not in the critical path for new features.
[[tool.mypy.overrides]]
module = [
    "app.services.radar_calculator",
    "app.services.luck_adjusted",
    "app.services.nba_data",
    "app.services.bpm_calculator",
    "app.services.per_calculator",
    "app.services.portability",
    "app.services.pbp_data",
    "app.services.player_card",
    "app.services.rate_limiter",
    "app.services.redis_cache",
]
ignore_errors = true

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
addopts = "-v --tb=short"
markers = [
    "unit: Unit tests (fast, isolated)",
    "integration: Integration tests (may require external services)",
    "slow: Tests that take a long time to run",
]

[tool.coverage.run]
source = ["app"]
branch = true
omit = ["*/tests/*", "*/__pycache__/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
]
