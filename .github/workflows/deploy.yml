name: Deploy to cluster

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  BACKEND_IMAGE: ghcr.io/akumar23/nba-stats-backend
  FRONTEND_IMAGE: ghcr.io/akumar23/nba-stats-frontend
  NAMESPACE: nba-stats

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      manifests: ${{ steps.filter.outputs.manifests }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
            frontend:
              - 'frontend/**'
            manifests:
              - 'k8s/**'

  test-backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Ruff lint
        working-directory: backend
        run: ruff check .
      - name: MyPy type check
        working-directory: backend
        run: mypy app
      - name: Pytest
        working-directory: backend
        run: pytest

  test-frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      # TODO(lint): migrate to eslint flat config (eslint.config.js) and re-enable.
      # ESLint 9 dropped .eslintrc and the repo does not yet ship a flat config.
      - name: Lint
        working-directory: frontend
        run: |
          if [ -f eslint.config.js ] || [ -f eslint.config.mjs ] || [ -f eslint.config.cjs ]; then
            npm run lint
          else
            echo "No eslint flat config; skipping lint (see TODO in deploy.yml)."
          fi
      - name: TypeScript type check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Build
        working-directory: frontend
        run: npm run build

  build-backend:
    needs: [changes, test-backend]
    if: (needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch') && needs.test-backend.result != 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ github.sha }}
            ${{ env.BACKEND_IMAGE }}:latest
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
          # Note: Using :latest tag for convenience, but K8s manifests should pin to commit SHA
          # to ensure reproducible, auditable deployments

  build-frontend:
    needs: [changes, test-frontend]
    if: (needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch') && needs.test-frontend.result != 'failure'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
          # Note: Using :latest tag for convenience, but K8s manifests should pin to commit SHA
          # to ensure reproducible, auditable deployments

  deploy:
    needs: [changes, test-backend, test-frontend, build-backend, build-frontend]
    if: |
      always() &&
      needs.test-backend.result != 'failure' &&
      needs.test-frontend.result != 'failure' &&
      needs.build-backend.result != 'failure' &&
      needs.build-frontend.result != 'failure' &&
      (needs.changes.outputs.backend == 'true' ||
       needs.changes.outputs.frontend == 'true' ||
       needs.changes.outputs.manifests == 'true' ||
       github.event_name == 'workflow_dispatch')
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Verify cluster access
        run: kubectl cluster-info

      - name: Apply manifests
        if: needs.changes.outputs.manifests == 'true'
        run: kubectl apply -f k8s/

      - name: Ensure namespace exists
        run: kubectl apply -f k8s/namespace.yaml

      - name: Update backend images to commit SHA
        if: needs.changes.outputs.backend == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          TAG="${BACKEND_IMAGE}:${{ github.sha }}"
          kubectl -n "$NAMESPACE" set image deployment/backend       "*=$TAG"
          kubectl -n "$NAMESPACE" set image deployment/celery-worker "*=$TAG"
          kubectl -n "$NAMESPACE" set image deployment/celery-beat   "*=$TAG"

      - name: Update frontend image to commit SHA
        if: needs.changes.outputs.frontend == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          TAG="${FRONTEND_IMAGE}:${{ github.sha }}"
          kubectl -n "$NAMESPACE" set image deployment/frontend "*=$TAG"

      - name: Wait for rollouts
        run: |
          set -e
          if [ "${{ needs.changes.outputs.backend }}" = "true" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            kubectl -n "$NAMESPACE" rollout status deployment/backend       --timeout=5m
            kubectl -n "$NAMESPACE" rollout status deployment/celery-worker --timeout=5m
            kubectl -n "$NAMESPACE" rollout status deployment/celery-beat   --timeout=5m
          fi
          if [ "${{ needs.changes.outputs.frontend }}" = "true" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            kubectl -n "$NAMESPACE" rollout status deployment/frontend --timeout=5m
          fi

      - name: Rollback on failure
        if: failure()
        run: |
          echo "Rollout failed. Rolling back deployments..."
          if [ "${{ needs.changes.outputs.backend }}" = "true" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            kubectl -n "$NAMESPACE" rollout undo deployment/backend || true
            kubectl -n "$NAMESPACE" rollout undo deployment/celery-worker || true
            kubectl -n "$NAMESPACE" rollout undo deployment/celery-beat || true
          fi
          if [ "${{ needs.changes.outputs.frontend }}" = "true" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            kubectl -n "$NAMESPACE" rollout undo deployment/frontend || true
          fi
