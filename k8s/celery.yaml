apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  namespace: nba-stats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: celery-worker
          image: ghcr.io/akumar23/nba-stats-backend:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - app.core.celery_app
            - worker
            - --loglevel=info
            - --queues=data_refresh
            - --concurrency=1
          # Observability env (Sentry + structlog) — same ConfigMap as the
          # backend. The DSN is a write-only URL so using a ConfigMap
          # instead of a Secret is a deliberate simplification.
          envFrom:
            - configMapRef:
                name: observability-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: REDIS_URL
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: CELERY_BROKER_URL
            - name: CELERY_RESULT_BACKEND
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: CELERY_RESULT_BACKEND
            - name: NBA_API_CACHE_DIR
              value: /app/data/nba_api_cache
          volumeMounts:
            - name: nba-api-cache
              mountPath: /app/data/nba_api_cache
      volumes:
        - name: nba-api-cache
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
  namespace: nba-stats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: celery-beat
          image: ghcr.io/akumar23/nba-stats-backend:latest
          imagePullPolicy: Always
          command:
            - celery
            - -A
            - app.core.celery_app
            - beat
            - --loglevel=info
          # Observability env — see backend.yaml / observability-config.yaml.
          envFrom:
            - configMapRef:
                name: observability-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: REDIS_URL
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: CELERY_BROKER_URL
            - name: CELERY_RESULT_BACKEND
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: CELERY_RESULT_BACKEND
