# EXAMPLE KUBERNETES SECRETS FILE
# ============================================
# THIS IS AN EXAMPLE ONLY - DO NOT USE IN PRODUCTION
#
# IMPORTANT: This is a template showing the structure of required secrets.
# For actual deployment, you must:
#   1. Create secrets with REAL credentials locally (never commit to git)
#   2. Apply them to your cluster using kubectl or sealed-secrets
#   3. Consider rotating the old postgres/postgres credentials (they were exposed in git history)
#
# CREDENTIAL ROTATION (URGENT):
#   The default postgres/postgres credentials have been committed to git history.
#   Anyone with access to git history can see them. You MUST:
#   1. Change the PostgreSQL password in your live cluster
#   2. Update DATABASE_URL in your environment
#   3. Restart the backend/celery deployments with new credentials
#   See k8s/sealed-secrets/README.md for secure secret management patterns.

apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: nba-stats
type: Opaque
data:
  # EXAMPLE VALUES ONLY - Replace with actual credentials
  # These are base64-encoded for demonstration:
  # - cGxhY2Vob2xkZXItcmVwbGFjZS1tZQ== = placeholder-replace-me
  POSTGRES_USER: cGxhY2Vob2xkZXItcmVwbGFjZS1tZQ==
  POSTGRES_PASSWORD: cGxhY2Vob2xkZXItcmVwbGFjZS1tZQ==
  POSTGRES_DB: bmJhX3N0YXRz              # nba_stats (this is safe to keep)
  # Format: postgresql://username:password@hostname:port/database
  DATABASE_URL: cGxhY2Vob2xkZXItcmVwbGFjZS1tZQ==
---
apiVersion: v1
kind: Secret
metadata:
  name: redis-credentials
  namespace: nba-stats
type: Opaque
data:
  # EXAMPLE VALUES ONLY - Replace with actual credentials
  REDIS_URL: cGxhY2Vob2xkZXItcmVwbGFjZS1tZQ==
  CELERY_BROKER_URL: cGxhY2Vob2xkZXItcmVwbGFjZS1tZQ==
  CELERY_RESULT_BACKEND: cGxhY2Vob2xkZXItcmVwbGFjZS1tZQ==
