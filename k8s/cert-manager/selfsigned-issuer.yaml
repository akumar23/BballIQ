# Self-signed ClusterIssuer for local development/homelab (cert-manager required)
# Use this if you prefer not to use Let's Encrypt (e.g., for .local domains)
#
# Install cert-manager first:
#   kubectl apply -f https://github.com/cert-manager/cert-manager/releases/download/v1.15.0/cert-manager.yaml
#
# Then apply this file:
#   kubectl apply -f k8s/cert-manager/selfsigned-issuer.yaml
#   kubectl apply -f k8s/cert-manager/selfsigned-certificate.yaml

apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: selfsigned
spec:
  selfSigned: {}
