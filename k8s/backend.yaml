apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: nba-stats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
      # Pod-level Prometheus scrape annotations. These are a no-op unless a
      # Prometheus install with annotation-based discovery is running in the
      # cluster; see k8s/observability-config.yaml for context.
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/path: "/metrics"
        prometheus.io/port: "8000"
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      initContainers:
        - name: migrate
          image: ghcr.io/akumar23/nba-stats-backend:latest
          imagePullPolicy: Always
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DATABASE_URL
      containers:
        - name: backend
          image: ghcr.io/akumar23/nba-stats-backend:latest
          imagePullPolicy: Always
          # Observability env (Sentry + structlog) loaded from the
          # observability-config ConfigMap — apply k8s/observability-config.yaml
          # before rolling this deployment.
          envFrom:
            - configMapRef:
                name: observability-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: REDIS_URL
            - name: CELERY_BROKER_URL
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: CELERY_BROKER_URL
            - name: CELERY_RESULT_BACKEND
              valueFrom:
                secretKeyRef:
                  name: redis-credentials
                  key: CELERY_RESULT_BACKEND
            - name: NBA_API_CACHE_DIR
              value: /app/data/nba_api_cache
            - name: CORS_ORIGINS
              value: '["http://nba-stats.local", "http://localhost:3000"]'
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: nba-api-cache
              mountPath: /app/data/nba_api_cache
      volumes:
        - name: nba-api-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: nba-stats
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
