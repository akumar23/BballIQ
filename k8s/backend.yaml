apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: nba-stats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      initContainers:
        - name: migrate
          image: ghcr.io/akumar23/nba-stats-backend:latest
          imagePullPolicy: Always
          command: ["alembic", "upgrade", "head"]
          env:
            - name: DATABASE_URL
              value: postgresql://postgres:postgres@db:5432/nba_stats
      containers:
        - name: backend
          image: ghcr.io/akumar23/nba-stats-backend:latest
          imagePullPolicy: Always
          env:
            - name: DATABASE_URL
              value: postgresql://postgres:postgres@db:5432/nba_stats
            - name: REDIS_URL
              value: redis://redis:6379/0
            - name: CELERY_BROKER_URL
              value: redis://redis:6379/1
            - name: CELERY_RESULT_BACKEND
              value: redis://redis:6379/2
            - name: NBA_API_CACHE_DIR
              value: /app/data/nba_api_cache
            - name: CORS_ORIGINS
              value: '["http://nba-stats.local", "http://localhost:3000"]'
          ports:
            - containerPort: 8000
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
          volumeMounts:
            - name: nba-api-cache
              mountPath: /app/data/nba_api_cache
      volumes:
        - name: nba-api-cache
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: nba-stats
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
